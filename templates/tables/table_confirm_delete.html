{% extends 'base.html' %}
{% block title %}Desactivar Mesa - BackyardFlow POS{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-danger text-white"><h5 class="mb-0">Desactivar Mesa</h5></div>
                <div class="card-body text-center">
                    <i class="fas fa-exclamation-triangle fa-4x text-warning mb-3"></i>
                    <h5>¿Desactivar Mesa {{ object.number }}?</h5>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <a href="{% url 'tables:table_map' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-danger">Desactivar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
