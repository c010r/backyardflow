{% extends 'base.html' %}
{% block title %}Cerrar Comanda - BackyardFlow POS{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Cerrar Comanda {{ order.order_number }}</h5>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <h5>Total: ${{ order.total|floatformat:2 }}</h5>
                    <p class="text-muted">¿Proceder al cobro de la comanda?</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <a href="{% url 'orders:order_detail' order.pk %}" class="btn btn-outline-secondary">Volver</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-dollar-sign me-1"></i>Cobrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
