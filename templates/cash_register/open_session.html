{% extends 'base.html' %}
{% block title %}Abrir Sesion de Caja - BackyardFlow POS{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-unlock me-2"></i>Abrir Sesion de Caja</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Caja Registradora *</label>
                            {{ form.cash_register }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Monto de Apertura ($)</label>
                            {{ form.opening_amount }}
                            <small class="text-muted">Dinero inicial en caja</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Notas</label>
                            {{ form.notes }}
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'cash_register:dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-unlock me-1"></i>Abrir Sesion
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
