{% extends 'base.html' %}
{% block title %}{% if object %}Editar{% else %}Nueva{% endif %} Caja - BackyardFlow POS{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="fas fa-cash-register me-2"></i>{% if object %}Editar{% else %}Nueva{% endif %} Caja</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3"><label class="form-label fw-semibold">Nombre *</label>
                            <input type="text" name="name" value="{{ form.name.value|default:'' }}" class="form-control" required>
                        </div>
                        <div class="mb-3"><label class="form-label fw-semibold">Ubicacion</label>
                            <input type="text" name="location" value="{{ form.location.value|default:'' }}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="active" class="form-check-input" id="id_active" {% if form.active.value %}checked{% endif %}>
                                <label class="form-check-label" for="id_active">Activo</label>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'cash_register:register_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
